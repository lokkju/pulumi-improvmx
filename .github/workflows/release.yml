name: Release

on:
  push:
    tags:
      - "v*"

env:
  PROVIDER: pulumi-resource-improvmx
  GO_VERSION: "1.24"

jobs:
  build-provider:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build provider binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          mkdir -p dist/
          go build -o "dist/${{ env.PROVIDER }}${EXT}" \
            -ldflags "-X github.com/lokkju/pulumi-improvmx/provider.Version=${VERSION}" \
            ./provider/cmd/${{ env.PROVIDER }}
          tar czf "${{ env.PROVIDER }}-v${VERSION}-${GOOS}-${GOARCH}.tar.gz" -C dist/ "${{ env.PROVIDER }}${EXT}"
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: provider-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.PROVIDER }}-*.tar.gz

  generate-sdks:
    needs: build-provider
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: pulumi/actions@v6
      - name: Download linux-amd64 provider
        uses: actions/download-artifact@v4
        with:
          name: provider-linux-amd64
          path: bin/
      - name: Generate schema and SDKs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar xzf bin/*.tar.gz -C bin/
          rm -f bin/*.tar.gz
          chmod +x bin/${{ env.PROVIDER }}
          pulumi package get-schema ./bin/${{ env.PROVIDER }} | jq -f scripts/patch-schema.jq > schema.json
          pulumi package gen-sdk --language python schema.json --version "$VERSION"
          pulumi package gen-sdk --language nodejs schema.json --version "$VERSION"
          pulumi package gen-sdk --language dotnet schema.json --version "$VERSION"
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-python
          path: sdk/python/
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-nodejs
          path: sdk/nodejs/
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-dotnet
          path: sdk/dotnet/

  github-release:
    needs: build-provider
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true

  publish-python:
    needs: generate-sdks
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-python
          path: sdk/python/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build package
        run: |
          pip install build
          cd sdk/python
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  publish-npm:
    needs: generate-sdks
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-nodejs
          path: sdk/nodejs/
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Publish to npm
        run: |
          cd sdk/nodejs
          npm pkg set repository.type=git repository.url=https://github.com/lokkju/pulumi-improvmx
          npm install
          npm publish --provenance --access public

  publish-nuget:
    needs: generate-sdks
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: nuget
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-dotnet
          path: sdk/dotnet/
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build NuGet package
        run: |
          cd sdk/dotnet
          dotnet build --configuration Release
          dotnet pack --configuration Release --no-build --output nupkgs
      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Publish to NuGet
        run: dotnet nuget push sdk/dotnet/nupkgs/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
